<!DOCTYPE html>

<html>
<head>
    <meta charset="utf-8" />
    <title>UAV Map</title>

    <!--Adding refrences-->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!--Adding stylesheets-->
    <link rel="stylesheet" type="text/css" href="LeafletMap.css" />
</head>

<body>
    <div id="map"></div>

    <script>
        var map = L.map('map').setView([47.6, -122.33], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Add a UAV marker (example)
        var uavMarker = L.marker([47.6, -122.33]).addTo(map)
            .bindPopup('UAV Start Position')
            .openPopup();
    </script>
</body>
</html>
